id: t_14_1_3_2
type: table
title_line1: Table 14.1.3.2
title_line2: Treatment Compliance
title_line3: Safety Analysis Set
adam_domains:
- adsl
analysis_set: SAF
column_layout: safety_with_total
row_schema:
- label: Treatment Compliance (%)
  kind: continuous
  var: COMPLIANCE_PCT
  level: 0
- label: Treatment Compliance (%), n (%)
  kind: categorical_bins
  var: COMPLIANCE_PCT
  level: 0
  bins:
  - label: < 80%
    lo: null
    hi: 80
    inclusive_hi: false
  - label: 80 to 120%
    lo: 80
    hi: 120
    inclusive_lo: true
    inclusive_hi: true
  - label: '> 120%'
    lo: 120
    hi: null
    inclusive_lo: false
footnotes:
- 'Treatment compliance is computed as (AVGDD / target dose) {{ multiply_sign }} 100
  for each subject, where target dose is the planned daily dose per arm (Low Dose:
  54 mg; High Dose: 81 mg; Placebo: not applicable).'
conditionality: optional
optional_flag: table_14_1_3_2_compliance
programming_notes:
- Typically not used for infusion-type treatment given in in-patient setting.
