id: t_14_3_1_2
type: table
title_line1: Table 14.3.1.2
title_line2: Summary of Treatment-Emergent Adverse Events by System Organ Class and
  Preferred Term
title_line3: Safety Analysis Set
adam_domains:
- adae
- adsl
analysis_set: SAF
column_layout: safety_with_total
show_occurrences: true
row_schema:
- label: Subjects with at Least One Treatment-Emergent Adverse Event
  kind: n_pct_m
  filter:
    TRTEMFL: Y
- label: '{soc}'
  kind: n_pct_m
  filter:
    TRTEMFL: Y
  level: 0
  group_by: AEBODSYS
- label: '{pt}'
  kind: n_pct_m
  filter:
    TRTEMFL: Y
  level: 1
  group_by: AEDECOD
sort: Total descending by SOC, then PT within SOC
footnotes:
- n = incidence, m = number of occurrences, teae = treatment-emergent adverse event,
  soc = system organ class, pt = preferred term.
- MedDRA Version {{ meddra_version }}.
- An AE is considered TEAE if {{ teae_definition }}
- Subjects with multiple adverse events within the same system organ class or preferred
  term are only counted once within the respective category.
conditionality: required
programming_notes: []
